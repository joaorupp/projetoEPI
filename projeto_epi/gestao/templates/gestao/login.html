{% extends 'gestao/index.html' %}
{% load static %}

{% block title %}Login - Sistema de EPI{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <i class="fa-solid fa-lock" style="font-size: 3rem; color: #2c3e50;"></i>
        <h2 style="margin-top: 15px; color: #2c3e50;">Acesso ao Sistema</h2>
        <p style="color: #7f8c8d;">Insira suas credenciais para continuar</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div style="padding: 10px; margin-bottom: 20px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
                Usuário ou senha incorretos.
            </div>
        {% endif %}

        <div style="margin-bottom: 20px;">
            <label for="id_username" style="display: block; margin-bottom: 5px; font-weight: 600;">Usuário:</label>
            <div style="position: relative;">
                <i class="fa-solid fa-user" style="position: absolute; left: 10px; top: 12px; color: #95a5a6;"></i>
                <input type="text" name="username" id="id_username" required 
                       style="width: 100%; padding: 10px 10px 10px 35px; border: 1px solid #dcdde1; border-radius: 4px; box-sizing: border-box;">
            </div>
        </div>

        <div style="margin-bottom: 25px;">
            <label for="id_password" style="display: block; margin-bottom: 5px; font-weight: 600;">Senha:</label>
            <div style="position: relative;">
                <i class="fa-solid fa-key" style="position: absolute; left: 10px; top: 12px; color: #95a5a6;"></i>
                <input type="password" name="password" id="id_password" required 
                       style="width: 100%; padding: 10px 10px 10px 35px; border: 1px solid #dcdde1; border-radius: 4px; box-sizing: border-box;">
            </div>
        </div>

        <button type="submit" style="width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; transition: background 0.3s;">
            Entrar no Sistema
        </button>
    </form>
</div>
{% endblock %}
